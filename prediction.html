<!DOCTYPE html>
<html>

<head>
    <title>AI Crime Prediction</title>
    <link rel="stylesheet" href="style.css">


    <style>
        .box {
            background: #16243b;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        h2 {
            color: #00ffff;
        }

        .progress {
            background: #333;
            border-radius: 20px;
            height: 25px;
        }

        .bar {
            background: red;
            width: 87%;
            height: 25px;
            border-radius: 20px;
            text-align: center;
            line-height: 25px;
            font-weight: bold;
        }
    </style>

</head>

<body>

    <header>
        🤖 AI Crime Prediction
    </header>

    <div class="container">

        <div class="box">
            <h2>Next Possible Crime Area</h2>
            <h3>Salt Lake Sector V</h3>
        </div>

        <div class="box">
            <h2>Predicted Crime</h2>
            <h3>Vehicle Theft</h3>
        </div>

        <div class="box">
            <h2>Prediction Accuracy</h2>

            <div class="progress">
                <div class="bar">
                    87%
                </div>
            </div>

        </div>

        <div class="box">

            <h2>Suggested Police Action</h2>

            <ul>

                <li>Increase Night Patrol</li>

                <li>Monitor CCTV</li>

                <li>Deploy Quick Response Team</li>

                <li>Alert Nearby Police Stations</li>

            </ul>

        </div>

        <a href="dashboard.html" class="page-link">

            ⬅ Dashboard

        </a>

    </div>

</body>

</html>
