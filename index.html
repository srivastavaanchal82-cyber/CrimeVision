<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrimeVision AI - Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {

            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #071320, #0b2a4d, #08111f);
            overflow: hidden;

        }

        body::before {

            content: '';
            position: absolute;
            width: 700px;
            height: 700px;
            background: #00ffff22;
            border-radius: 50%;
            left: -180px;
            top: -180px;
            filter: blur(120px);

        }

        body::after {

            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            background: #0077ff22;
            border-radius: 50%;
            right: -150px;
            bottom: -150px;
            filter: blur(120px);

        }

        .login-card {

            position: relative;
            width: 420px;
            padding: 40px;
            background: rgba(255, 255, 255, .08);
            backdrop-filter: blur(18px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, .15);
            box-shadow: 0 0 30px rgba(0, 255, 255, .2);
            z-index: 10;

        }

        .logo {

            font-size: 65px;
            text-align: center;
            color: #00e5ff;

        }

        .title {

            text-align: center;
            font-size: 34px;
            font-weight: bold;
            color: white;
            margin-top: 10px;

        }

        .subtitle {

            text-align: center;
            color: #b7dfff;
            margin-bottom: 30px;

        }

        .form-control {

            background: #ffffff15;
            border: none;
            color: white;
            height: 50px;

        }

        .form-control::placeholder {

            color: #ddd;

        }

        .form-control:focus {

            background: #ffffff20;
            color: white;
            box-shadow: 0 0 10px #00e5ff;
            border: none;

        }

        .btn-login {

            width: 100%;
            height: 50px;
            background: #00bcd4;
            border: none;
            font-size: 18px;
            font-weight: bold;
            margin-top: 15px;

        }

        .btn-login:hover {

            background: #0097a7;

        }

        .features {

            margin-top: 30px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;

        }

        .feature {

            background: #ffffff10;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            color: white;

        }

        .footer {

            margin-top: 25px;
            text-align: center;
            font-size: 14px;
            color: #cccccc;

        }
    </style>
</head>

<body>

    <div class="login-card">

        <div class="logo">
            <i class="fa-solid fa-shield-halved"></i>
        </div>

        <div class="title">
            CrimeVision AI
        </div>

        <div class="subtitle">
            AI Powered Criminal Intelligence Platform
        </div>

        <input type="text" class="form-control mb-3" placeholder="Officer Username">

        <input type="password" class="form-control" placeholder="Password">

        <button class="btn btn-login">
            Login Securely
        </button>

        <div class="features">

            <div class="feature">
                <i class="fa-solid fa-brain"></i><br>
                AI Prediction
            </div>

            <div class="feature">
                <i class="fa-solid fa-map-location-dot"></i><br>
                Crime Map
            </div>

            <div class="feature">
                <i class="fa-solid fa-database"></i><br>
                Records
            </div>

            <div class="feature">
                <i class="fa-solid fa-bell"></i><br>
                Live Alerts
            </div>
        </div>

        <div class="footer">
            🚔 Datathon 2026 Prototype<br>
            CrimeVision AI v2.0
        </div>

    </div>

    <script>

        const loginButton = document.querySelector(".btn-login");

        const VALID_USERNAME = "sarvision";
        const VALID_PASSWORD = "aanchal@123";

        loginButton.addEventListener("click", function () {

            const username = document.querySelectorAll(".form-control")[0].value.trim();
            const password = document.querySelectorAll(".form-control")[1].value;

            if (username === "" || password === "") {
                alert("Please enter Username and Password");
                return;
            }

            if (username === VALID_USERNAME && password === VALID_PASSWORD) {
                window.location.href = "dashboard.html";
            } else {
                alert("Invalid Username or Password");
            }

        });

    </script>

</body>

</html>
