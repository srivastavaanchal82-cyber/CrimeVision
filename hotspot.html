<!DOCTYPE html>
<html>

<head>
    <title>Crime Hotspots</title>
    <link rel="stylesheet" href="style.css">

    <style>
        .map {
            height: 350px;
            background: #1b263b;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            margin-bottom: 30px;
        }

        .card {
            background: #16243b;
            padding: 20px;
            border-radius: 12px;
            margin: 15px 0;
            font-size: 20px;
        }

        .high {
            border-left: 8px solid red;
        }

        .medium {
            border-left: 8px solid orange;
        }

        .low {
            border-left: 8px solid lime;
        }
    </style>

</head>

<body>

    <header>

        📍 Crime Hotspot Analysis

    </header>

    <div class="container">

        <div class="map">

            🗺 Interactive Crime Heat Map

        </div>

        <div class="card high">

            🔴 Salt Lake – High Risk (87%)

        </div>

        <div class="card high">

            🔴 Park Street – High Risk (81%)

        </div>

        <div class="card medium">

            🟠 Howrah – Medium Risk (61%)

        </div>

        <div class="card low">

            🟢 Dum Dum – Low Risk (24%)

        </div>

        <a href="dashboard.html" class="page-link">

            ⬅ Dashboard

        </a>

    </div>

</body>

</html>
