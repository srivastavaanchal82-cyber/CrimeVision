<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criminal Records</title>
    <link rel="stylesheet" href="style.css">
    <style>
        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            margin-bottom: 25px;
            font-size: 16px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #00bcd4;
            padding: 15px;
        }

        td {
            background: #16243b;
            padding: 15px;
            text-align: center;
        }

        tr:hover td {
            background: #203a43;
        }
    </style>

</head>

<body>

    <header>
        👮 Criminal Records Database
    </header>

    <div class="container">

        <input type="text" placeholder="🔍 Search Criminal Name / FIR Number">

        <table>

            <tr>
                <th>Photo</th>
                <th>Name</th>
                <th>Age</th>
                <th>Crime</th>
                <th>FIR</th>
                <th>Status</th>
            </tr>

            <tr>
                <td>👤</td>
                <td>Rahul Sharma</td>
                <td>29</td>
                <td>Robbery</td>
                <td>FIR-1023</td>
                <td>🔴 Wanted</td>
            </tr>

            <tr>
                <td>👤</td>
                <td>Aman Khan</td>
                <td>34</td>
                <td>Cyber Crime</td>
                <td>FIR-1198</td>
                <td>🟠 Investigation</td>
            </tr>

            <tr>
                <td>👤</td>
                <td>Vikas Singh</td>
                <td>40</td>
                <td>Drug Trafficking</td>
                <td>FIR-1405</td>
                <td>🟢 Arrested</td>
            </tr>

        </table>

        <a href="dashboard.html" class="page-link">
            ⬅ Back to Dashboard
        </a>

    </div>

</body>

</html>
