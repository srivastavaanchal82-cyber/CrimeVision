<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Criminal Records</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0b1727;
    color:white;
}
header{
    background:#08111f;
    padding:20px;
    text-align:center;
    color:#00ffff;
    font-size:30px;
    font-weight:bold;
}
.container{
    padding:30px;
}
input{
    width:100%;
    padding:12px;
    border-radius:8px;
    border:none;
    margin-bottom:25px;
    font-size:16px;
}
table{
    width:100%;
    border-collapse:collapse;
}
th{
    background:#00bcd4;
    padding:15px;
}
td{
    background:#16243b;
    padding:15px;
    text-align:center;
}
tr:hover{
    background:#203a43;
}
a{
    text-decoration:none;
    color:white;
    background:#00bcd4;
    padding:12px 20px;
    border-radius:8px;
    display:inline-block;
    margin-top:20px;
}

</header>
