<!DOCTYPE html>
<html>
<head>
<title>Smart Alerts</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b1727;
color:white;
}

header{
background:#08111f;
padding:20px;
text-align:center;
font-size:30px;
color:#00ffff;
}

.container{
padding:30px;
}

.alert{
padding:20px;
margin-bottom:20px;
border-radius:10px;
font-size:18px;
}

.red{
background:#8B0000;
}

.orange{
background:#CC7000;
}

.green{
background:#006400;
}

button{
padding:12px 20px;
background:#00bcd4;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#0097a7;
}

a{
display:inline-block;
margin-top:20px;
padding:12px 20px;
background:#00bcd4;
color:white;
text-decoration:none;
border-radius:8px;
}

</style>

</head>

<body>

<header>

🚨 Smart Alert Center

</header>

<div class="container">

<div class="alert red">

🚨 HIGH ALERT<br>
Armed Robbery Risk detected in Salt Lake Sector V.<br>
Recommended Action: Immediate Police Deployment.

</div>

<div class="alert orange">

⚠ MEDIUM ALERT<br>
Cyber Fraud cases increasing in Howrah.

</div>

<div class="alert green">

✅ LOW ALERT<br>
No unusual criminal activity detected in Dum Dum.

</div>

<button>

Send Emergency Notification

</button>

<br><br>

<a href="dashboard.html">

⬅ Back to Dashboard

</a>

</div>

</body>

</html>
